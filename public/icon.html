<!DOCTYPE html>
<!-- Source for apple-touch-icon.png. Render at 180x180. Full-bleed (iOS rounds corners). Not linked from the site. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 180px; height: 180px; overflow: hidden; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(150deg, #1c4e80 0%, #143a60 100%);
      font-family: "Manrope", system-ui, sans-serif;
    }
    .mark { color: #fff; font-weight: 800; font-size: 92px; letter-spacing: -4px; }
  </style>
</head>
<body>
  <div class="mark">P+</div>
</body>
</html>
