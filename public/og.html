<!DOCTYPE html>
<!-- Source card for og-image.png. Render at 1200x630. Not linked from the site. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      font-family: "Manrope", system-ui, sans-serif;
      color: #fff;
      background:
        radial-gradient(900px 500px at 85% -20%, rgba(232,71,43,.28), transparent 60%),
        linear-gradient(150deg, #1c4e80 0%, #143a60 100%);
      padding: 72px 80px;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .top { display: flex; align-items: center; gap: 18px; }
    .mark {
      width: 64px; height: 64px; border-radius: 16px; background: #fff;
      color: #1c4e80; font-weight: 800; font-size: 30px;
      display: flex; align-items: center; justify-content: center; letter-spacing: -1px;
    }
    .brand { font-size: 34px; font-weight: 800; }
    .eyebrow { text-transform: uppercase; letter-spacing: .16em; font-size: 19px; font-weight: 700; color: #bcd3ee; margin-bottom: 16px; }
    h1 { font-size: 76px; font-weight: 800; line-height: 1.05; letter-spacing: -1.5px; }
    .sub { font-size: 27px; color: #dce7f3; margin-top: 22px; font-weight: 500; }
    .badges { display: flex; gap: 14px; flex-wrap: wrap; }
    .badge { font-size: 20px; font-weight: 700; color: #e9f1fb; border: 1px solid rgba(255,255,255,.3); padding: 10px 20px; border-radius: 999px; }
    .foot { display: flex; align-items: center; justify-content: space-between; }
    .phone { font-size: 30px; font-weight: 800; }
    .accent { color: #ff8a6e; }
  </style>
</head>
<body>
  <div class="top">
    <div class="mark">P+</div>
    <div class="brand" style="text-transform:uppercase;letter-spacing:-0.01em;">POSTAL&amp;COPY<span class="accent">&nbsp;+</span></div>
  </div>

  <div>
    <p class="eyebrow">Clarkston, WA · FedEx ShipCenter &amp; USPS</p>
    <h1>Pack. Ship. Print.<br /><span class="accent">Notarize.</span></h1>
    <p class="sub">Shipping, printing, notary, mailboxes &amp; more — all in one place.</p>
  </div>

  <div class="foot">
    <div class="badges">
      <span class="badge">FedEx</span>
      <span class="badge">USPS</span>
      <span class="badge">Notary</span>
      <span class="badge">Printing</span>
      <span class="badge">Gift Shop</span>
    </div>
    <div class="phone">(509) 758-0234</div>
  </div>
</body>
</html>
